services:
  db:
    image: mysql:8.0
    container_name: webnongsan-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: uxi
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: uxi_user
      MYSQL_PASSWORD: uxi_password
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/uxi.sql:/docker-entrypoint-initdb.d/01-uxi.sql:ro
    healthcheck:
      test: ["CMD", "mysqlvendor", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: php:8.2-apache
    container_name: webnongsan-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: uxi
      DB_USER: root
      DB_PASSWORD: root
      APP_BASE_URL: http://localhost/nongsan-api
      FRONTEND_ORIGIN: http://localhost:3000
      JWT_SECRET: dev_only_change_me
      VNPAY_RETURN_URL: http://localhost/nongsan-api/vnpay_php/vnpay_return.php
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM_EMAIL: no-reply@nongsan.com
      MAIL_FROM_NAME: He Thong Nong San
      MAIL_ENCRYPTION: tls
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nongsan-api:/var/www/html/nongsan-api
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql &&
             a2enmod rewrite &&
             apache2-foreground"

  frontend:
    image: node:20-alpine
    container_name: webnongsan-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 5173"

volumes:
  db_data:
  frontend_node_modules:
